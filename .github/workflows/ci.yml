name: MiniShop CI Pipeline
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build-and-test:
    name: Build y Pruebas
    runs-on: ubuntu-latest
    steps:
      - name: 1 - Checkout
        uses: actions/checkout@v4
      - name: 2 - Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: 3 - Compilar
        run: mvn compile --no-transfer-progress
      - name: 4 - Pruebas unitarias
        run: mvn test --no-transfer-progress
      - name: 5 - Pruebas integracion
        run: mvn verify --no-transfer-progress
      - name: 6 - Reporte
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-pruebas
          path: target/surefire-reports/
          retention-days: 7